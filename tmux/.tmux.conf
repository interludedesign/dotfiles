set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

# Press y to copy highlighted text
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# Quickly kill the entire session you're working in
bind X kill-session

# Use mouse to scroll
set -g mouse on

# Give each pane a name
set -g pane-border-status bottom
set -g pane-border-format "#{pane_current_path}"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

bind -n C-k clear-history

# Default new shell to user's login shell
set-option -g default-shell "$SHELL"

# Remove any waiting after hitting ESC so it doesn't interfere with Normal mode in vim
set -s escape-time 0

# For new panes
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# For new windows
bind c new-window -c "#{pane_current_path}"

# Switch to tmux session by position (Ctrl+1-4, no prefix required)
# Requires a terminal that passes through Ctrl+number (e.g. Ghostty with extended-keys)
set -g extended-keys on
bind -n C-1 run-shell "s=$(tmux list-sessions -F '#S' | sed -n '1p'); [ -n \"$s\" ] && tmux switch-client -t \"$s\""
bind -n C-2 run-shell "s=$(tmux list-sessions -F '#S' | sed -n '2p'); [ -n \"$s\" ] && tmux switch-client -t \"$s\""
bind -n C-3 run-shell "s=$(tmux list-sessions -F '#S' | sed -n '3p'); [ -n \"$s\" ] && tmux switch-client -t \"$s\""
bind -n C-4 run-shell "s=$(tmux list-sessions -F '#S' | sed -n '4p'); [ -n \"$s\" ] && tmux switch-client -t \"$s\""
